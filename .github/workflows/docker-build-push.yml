name: Docker Build and Push to Docker Hub

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/master' && secrets.DOCKER_USERNAME != ''
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        id: docker_build
        uses: docker/build-push-action@v4
        with:
          context: ./movie-app
          file: ./movie-app/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' && secrets.DOCKER_USERNAME != '' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/movie-app:latest
            ${{ secrets.DOCKER_USERNAME }}/movie-app:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/movie-app:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/movie-app:buildcache,mode=max

      - name: Image digest
        if: steps.docker_build.outcome == 'success'
        run: echo "Image digest: ${{ steps.docker_build.outputs.digest }}"

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'eclipse-temurin'
          cache: maven

      - name: Run Maven tests
        run: |
          cd movie-app
          mvn test

      - name: Build with Maven
        run: |
          cd movie-app
          mvn clean package
